<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Musée HOP WW2 - Accueil</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    body {
      margin: 0;
      font-family: system-ui, sans-serif;
      background: #0f1113;
      color: #e5e5e5;
    }

    a {
      color: #f0c96a;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    header, section, footer {
      padding: 40px;
    }

    header {
      background: #1b1f23;
      border-bottom: 2px solid #f0c96a;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      font-weight: 700;
      font-size: 1.4rem;
      letter-spacing: 1px;
      color: #f0c96a;
    }

    nav a {
      margin: 0 10px;
      font-size: 1rem;
    }

    .hero {
      text-align: center;
      padding: 60px 20px;
    }

    .hero-title {
      font-size: 2.4rem;
      margin-bottom: 10px;
      color: #f0c96a;
    }

    .hero-sub {
      font-size: 1.2rem;
      color: #ccc;
      margin-bottom: 25px;
    }

    .btn {
      padding: 12px 22px;
      border-radius: 5px;
      background: #f0c96a;
      color: #000;
      font-weight: 600;
      display: inline-block;
    }

    footer {
      background: #1b1f23;
      text-align: center;
      border-top: 2px solid #f0c96a;
      margin-top: 40px;
      padding: 20px;
      font-size: 0.9rem;
    }
  </style>
</head>

<body>

  <header>
    <div class="topbar">
      <div class="logo">Musée HOP WW2</div>
      <nav>
        <a href="#">Accueil</a>
        <a href="#">Guides</a>
        <a href="#">Collections</a>
        <a href="#">Contact</a>
      </nav>
    </div>
  </header>

  <section class="hero">
    <h1 class="hero-title">Bienvenue au Musée HOP WW2</h1>
    <p class="hero-sub">Découvrez l’histoire, les objets, les uniformes et les batailles de la Seconde Guerre mondiale.</p>
    <a class="btn" href="#">Explorer les guides</a>
  </section>

  <footer>
    © 2026 – Musée HOP WW2. Tous droits réservés.
  </footer>

</body>
</html>
