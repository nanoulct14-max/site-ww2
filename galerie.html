<title>Galerie des Opérations</title>
<link rel="stylesheet" href="style.css">

<style>
/* STYLE GALERIE PREMIUM */

.gallery-title {
    text-align: center;
    font-size: 36px;
    margin-bottom: 30px;
    color: #2c3e50;
}

.gallery-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 20px;
}

.gallery-item {
    position: relative;
    overflow: hidden;
    border-radius: 10px;
    cursor: pointer;
}

.gallery-item img {
    width: 100%;
    height: 180px;
    object-fit: cover;
    filter: brightness(70%);
    transition: 0.3s;
}

.gallery-item:hover img {
    filter: brightness(50%);
    transform: scale(1.05);
}

.gallery-item-title {
    position: absolute;
    bottom: 10px;
    left: 15px;
    color: white;
    font-size: 20px;
    font-weight: bold;
    text-shadow: 0 0 10px black;
}
</style>

</head>
